version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: decodr-postgres
    environment:
      POSTGRES_USER: decodr
      POSTGRES_PASSWORD: decodr
      POSTGRES_DB: decodr
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decodr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
